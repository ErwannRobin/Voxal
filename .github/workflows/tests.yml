name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  rust-tests:
    name: Rust tests
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run Rust tests
        run: cd src-tauri && cargo test

  # Fast, deterministic suite (pure-logic unit tests + UI flows). This is the
  # gating check — keep it green.
  unit-e2e:
    name: E2E (unit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run unit E2E (unit project)
        run: npm run test:e2e

  # Multi-peer WebRTC tests (real PeerJS + a local broker). Inherently more
  # timing-sensitive than the unit suite, so it runs as its own job and is
  # non-blocking (continue-on-error) — a transient loopback-ICE hiccup must not
  # block merges, but real regressions still show up here (with retries: 2).
  mesh-e2e:
    name: E2E (mesh, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run mesh E2E (mesh project)
        run: npm run test:mesh
