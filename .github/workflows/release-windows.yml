name: Release Windows build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (e.g. v1.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Prepare Tauri updater signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
        run: |
          $keyPath = Join-Path $env:RUNNER_TEMP "tauri-updater.key"
          if ($env:TAURI_SIGNING_PRIVATE_KEY_B64) {
            [IO.File]::WriteAllBytes($keyPath, [Convert]::FromBase64String($env:TAURI_SIGNING_PRIVATE_KEY_B64))
          } elseif ($env:TAURI_SIGNING_PRIVATE_KEY) {
            [System.IO.File]::WriteAllText($keyPath, $env:TAURI_SIGNING_PRIVATE_KEY, [System.Text.UTF8Encoding]::new($false))
          } else {
            throw "Missing signing key secret. Set TAURI_SIGNING_PRIVATE_KEY or TAURI_SIGNING_PRIVATE_KEY_B64."
          }

          $raw = (Get-Content -Path $keyPath -Raw) -replace "`r", ""
          if ($raw -notmatch "`n" -and $raw.Contains('\n')) {
            $raw = $raw -replace '\\n', "`n"
          }
          $raw = $raw.Trim()

          $payload = $raw
          if ($raw.StartsWith("untrusted comment:")) {
            if ($raw.Contains("`n")) {
              $payload = $raw.Substring($raw.IndexOf("`n") + 1)
            } else {
              $payload = $raw -replace '^untrusted comment:[^\r\n]*', ''
            }
          }
          $payload = ($payload -replace '[^A-Za-z0-9+/=]', '')
          if (-not $payload) {
            throw "Invalid updater key format: missing minisign private key payload."
          }
          "TAURI_SIGNING_PRIVATE_KEY<<EOF" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $payload | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows installers
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Upload Windows assets to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            $tag = "${{ github.event.release.tag_name }}"
          } else {
            $tag = "$env:INPUT_TAG"
          }

          $assets = @()
          $assets += Get-ChildItem "src-tauri/target/release/bundle/msi" -Filter *.msi -Recurse -File | ForEach-Object { $_.FullName }
          $assets += Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter *.exe -Recurse -File | ForEach-Object { $_.FullName }

          if ($assets.Count -eq 0) {
            throw "No Windows installer artifacts found to upload."
          }

          gh release upload $tag $assets --clobber
