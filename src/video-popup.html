<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voxal — Camera</title>
  <style>
    body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: system-ui; }
    video { width: 100%; height: 100%; object-fit: contain; }
    .toolbar { position: fixed; top: 8px; right: 8px; display: flex; gap: 6px; opacity: 0; transition: opacity 0.2s; }
    body:hover .toolbar { opacity: 1; }
    .toolbar button { background: rgba(255,255,255,0.15); border: none; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; backdrop-filter: blur(4px); }
    .toolbar button:hover { background: rgba(255,255,255,0.25); }
    .fps-overlay {
      position: fixed; bottom: 8px; right: 8px;
      background: rgba(0,0,0,0.55); color: #0f0;
      font-family: 'SF Mono','Menlo','Consolas',monospace;
      font-size: 11px; line-height: 1; padding: 3px 6px;
      border-radius: 4px; pointer-events: none; z-index: 10;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      display: none;
    }
  </style>
</head>
<body>
  <video id="v" autoplay playsinline></video>
  <span id="fps-overlay" class="fps-overlay"></span>
  <div class="toolbar" id="toolbar">
    <button onclick="popIn()">⬇ Pop In</button>
  </div>
  <script>
    var v = document.getElementById('v');
    var pc = null;

    // Detect Tauri vs plain web
    var isTauri = !!window.__TAURI__;

    if (isTauri) {
      // Hide "Pop In" button on native desktop (user just closes the window)
      document.getElementById('toolbar').style.display = 'none';
      // --- Tauri: use Tauri events + WebRTC loopback ---
      var tauriEvent = window.__TAURI__.event;

      tauriEvent.listen('video-main-signal', async function(ev) {
        var msg = ev.payload;
        if (msg.type === 'offer') {
          pc = new RTCPeerConnection();
          pc.ontrack = function(e) {
            v.srcObject = e.streams[0] || new MediaStream([e.track]);
            v.play().catch(function() {});
            startFpsOverlay();
          };
          await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
          var answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          await new Promise(function(resolve) {
            if (pc.iceGatheringState === 'complete') return resolve();
            pc.onicecandidate = function(ev) { if (!ev.candidate) resolve(); };
          });
          tauriEvent.emit('video-popup-signal', {
            type: 'answer',
            sdp: { type: pc.localDescription.type, sdp: pc.localDescription.sdp }
          });
        }
        if (msg.type === 'close') {
          if (pc) { pc.close(); pc = null; }
          window.close();
        }
      });

      // Signal readiness to main window
      tauriEvent.emit('video-popup-signal', { type: 'ready' });

    } else {
      // --- Web fallback: window.opener ---
      if (window.opener && window.opener._voxalVideoStream) {
        v.srcObject = window.opener._voxalVideoStream;
        startFpsOverlay();
      }
    }

    function popIn() {
      if (isTauri) {
        window.__TAURI__.event.emit('video-popup-signal', { type: 'pop-in' });
        if (pc) { pc.close(); pc = null; }
      } else if (window.opener && window.opener._voxalVideoPopIn) {
        window.opener._voxalVideoPopIn();
      }
      window.close();
    }

    window.addEventListener('beforeunload', function() {
      if (isTauri) {
        window.__TAURI__.event.emit('video-popup-signal', { type: 'pop-in' });
        if (pc) pc.close();
      } else if (window.opener && window.opener._voxalVideoPopIn) {
        window.opener._voxalVideoPopIn();
      }
    });

    // --- FPS + resolution overlay (dev mode only) ---
    function startFpsOverlay() {
      try { if (localStorage.getItem('dev-mode') !== 'true') return; } catch(_) { return; }
      var overlay = document.getElementById('fps-overlay');
      if (!overlay) return;
      overlay.style.display = '';

      function resolveRes() {
        if (v.videoWidth && v.videoHeight) return v.videoWidth + '\u00d7' + v.videoHeight;
        var s = v.srcObject;
        if (s) { var t = s.getVideoTracks(); if (t.length) { var st = t[0].getSettings(); if (st.width && st.height) return st.width + '\u00d7' + st.height; } }
        return '';
      }

      if (typeof v.requestVideoFrameCallback === 'function') {
        var frames = 0, last = performance.now(), res = '';
        function onFrame(now, meta) {
          frames++;
          if (meta && meta.width && meta.height) res = meta.width + '\u00d7' + meta.height;
          v.requestVideoFrameCallback(onFrame);
        }
        v.requestVideoFrameCallback(onFrame);
        setInterval(function() {
          var dt = (performance.now() - last) / 1000;
          var fps = dt > 0 ? Math.round(frames / dt) : 0;
          var r = res || resolveRes();
          overlay.textContent = fps + ' fps' + (r ? '  ' + r : '');
          frames = 0; last = performance.now();
        }, 1000);
      } else {
        var prev = v.getVideoPlaybackQuality ? v.getVideoPlaybackQuality().totalVideoFrames || 0 : 0;
        setInterval(function() {
          var cur = v.getVideoPlaybackQuality ? v.getVideoPlaybackQuality().totalVideoFrames || 0 : 0;
          var fps = cur - prev; prev = cur;
          var r = resolveRes();
          overlay.textContent = fps + ' fps' + (r ? '  ' + r : '');
        }, 1000);
      }
    }
  </script>
</body>
</html>
