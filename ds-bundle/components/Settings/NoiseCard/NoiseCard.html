<!-- @dsCard group="Settings" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0f0f1a; --bg-raised: #1c1c33; --border: #2e2e50;
    --text: #e0e0f0; --text-muted: #7a7a9d; --accent: #7c6af7;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0; padding: 20px; font-size: 13px;
  }
  .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; margin-bottom: 12px; }
  .noise-card-group { display: flex; flex-direction: column; gap: 8px; max-width: 320px; }
  .noise-card {
    display: grid; grid-template-columns: auto 1fr;
    column-gap: 10px; row-gap: 2px; align-items: start;
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; background: var(--bg-raised); cursor: pointer;
  }
  .noise-card input[type="radio"] {
    margin: 2px 0 0; accent-color: var(--accent);
    grid-column: 1; grid-row: 1 / span 2;
  }
  .noise-card-title { font-size: 13px; font-weight: 600; grid-column: 2; }
  .noise-card-title em { font-style: normal; color: var(--accent); }
  .noise-card-desc { font-size: 12px; color: var(--text-muted); grid-column: 2; }
</style>
</head>
<body>
  <div class="lbl">Noise suppression options</div>
  <div class="noise-card-group">
    <label class="noise-card">
      <input type="radio" name="noise" checked>
      <span class="noise-card-title"><em>AI</em> Noise Suppression</span>
      <span class="noise-card-desc">Removes background noise using Krisp. Best quality.</span>
    </label>
    <label class="noise-card">
      <input type="radio" name="noise">
      <span class="noise-card-title">Browser suppression</span>
      <span class="noise-card-desc">Built-in browser noise cancellation. Lower CPU usage.</span>
    </label>
    <label class="noise-card">
      <input type="radio" name="noise">
      <span class="noise-card-title">Off</span>
      <span class="noise-card-desc">Raw microphone audio, no processing.</span>
    </label>
  </div>
</body>
</html>
