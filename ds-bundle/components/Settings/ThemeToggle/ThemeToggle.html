<!-- @dsCard group="Settings" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0f0f1a; --bg-surface: #151526; --bg-raised: #1c1c33;
    --border: #2e2e50; --text: #e0e0f0; --text-muted: #7a7a9d; --accent: #7c6af7;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0; padding: 20px; font-size: 13px;
  }
  .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; margin-bottom: 10px; }
  .theme-toggle {
    display: flex; gap: 2px; margin-top: 2px;
    background: var(--bg-raised); border: 1px solid var(--border);
    border-radius: 999px; padding: 2px; max-width: 220px;
  }
  .theme-toggle button {
    flex: 1; padding: 6px 8px; border: none; border-radius: 999px;
    background: transparent; color: var(--text-muted); font-size: 13px;
    cursor: pointer; transition: background 0.15s, color 0.15s; font-family: inherit;
  }
  .theme-toggle button.active { background: var(--accent); color: #fff; }
  .theme-toggle button:hover:not(.active) { background: var(--bg-surface); color: var(--text); }
</style>
</head>
<body>
  <div class="lbl">Theme — dark active</div>
  <div class="theme-toggle">
    <button class="active">🌙 Dark</button>
    <button>☀️ Light</button>
    <button>💻 System</button>
  </div>

  <div class="lbl" style="margin-top: 20px">Theme — light active</div>
  <div class="theme-toggle">
    <button>🌙 Dark</button>
    <button class="active">☀️ Light</button>
    <button>💻 System</button>
  </div>
</body>
</html>
