<!-- @dsCard group="Feedback" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0f0f1a; --bg-raised: #1c1c33; --border: #2e2e50;
    --text: #e0e0f0; --text-muted: #7a7a9d;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0; padding: 20px; font-size: 13px;
  }
  .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; margin-bottom: 12px; }
  .copy-toast {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-raised); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 16px;
    font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    max-width: 260px;
  }
  .copy-toast-icon { font-size: 16px; }
  /* In the app: position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 500; */
</style>
</head>
<body>
  <div class="lbl">Copy confirmation toast</div>
  <div class="copy-toast">
    <span class="copy-toast-icon">✅</span>
    <span>Link copied!</span>
  </div>

  <div class="lbl" style="margin-top: 20px">Generic info toast</div>
  <div class="copy-toast">
    <span class="copy-toast-icon">ℹ️</span>
    <span>Name updated</span>
  </div>
</body>
</html>
