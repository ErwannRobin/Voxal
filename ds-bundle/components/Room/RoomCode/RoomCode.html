<!-- @dsCard group="Room" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0f0f1a; --bg-surface: #151526; --bg-raised: #1c1c33;
    --border: #2e2e50; --text: #e0e0f0; --text-muted: #7a7a9d;
    --accent: #7c6af7; --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0; padding: 20px; font-size: 13px;
  }
  .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; margin-bottom: 12px; }
  .room-code-copy {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-raised); border: 1px solid var(--border);
    border-radius: 8px; padding: 5px 8px; cursor: pointer;
    transition: border-color 0.15s; max-width: 220px;
  }
  .room-code-copy:hover { border-color: var(--accent); }
  .room-code {
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
    color: var(--accent); flex: 1 1 auto; min-width: 0;
    max-width: 160px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap;
  }
  .copy-icon { color: var(--text-muted); flex-shrink: 0; font-size: 14px; }
  .copy-toast {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-raised); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px;
    font-size: 13px; margin-top: 16px; max-width: 220px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  }
</style>
</head>
<body>
  <div class="lbl">Room code (copyable)</div>
  <div class="room-code-copy" title="Copy room link">
    <span class="room-code">abc-xyz-7f3k</span>
    <svg class="copy-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
    </svg>
  </div>

  <div class="lbl" style="margin-top:20px">Copy confirmation toast</div>
  <div class="copy-toast">
    ✅ Link copied!
  </div>
</body>
</html>
