<!-- @dsCard group="Room" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0f0f1a; --bg-raised: #1c1c33; --text-muted: #7a7a9d; --green: #4ade80;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: #e0e0f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0; padding: 20px; font-size: 13px;
  }
  .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; margin-bottom: 12px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; align-items: center; }
  .stat-badge {
    display: inline-block; font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px; padding: 1px 6px; border-radius: 10px; white-space: nowrap;
  }
  .stat-neutral { background: var(--bg-raised); color: var(--text-muted); }
  .ice-direct   { background: rgba(74,222,128,0.15); color: var(--green); }
  .ice-stun     { background: rgba(250,204,21,0.15); color: #fbbf24; }
  .ice-relay    { background: rgba(248,113,113,0.15); color: #f87171; }
  .ice-unknown  { background: var(--bg-raised); color: var(--text-muted); }
  .stat-warn    { background: rgba(248,113,113,0.15); color: #f87171; }
</style>
</head>
<body>
  <div class="lbl">ICE connection badges</div>
  <div class="row">
    <span class="stat-badge ice-direct">direct</span>
    <span class="stat-badge ice-stun">stun</span>
    <span class="stat-badge ice-relay">relay</span>
    <span class="stat-badge ice-unknown">unknown</span>
  </div>
  <div class="lbl">Metric &amp; warning badges</div>
  <div class="row">
    <span class="stat-badge stat-neutral">24 ms</span>
    <span class="stat-badge stat-neutral">128 kbps</span>
    <span class="stat-badge stat-warn">packet loss 8%</span>
  </div>
</body>
</html>
