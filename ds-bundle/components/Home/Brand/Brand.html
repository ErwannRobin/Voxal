<!-- @dsCard group="Home" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0f0f1a; --text: #e0e0f0; --text-muted: #7a7a9d; --accent: #7c6af7;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0; padding: 0;
    /* Desktop radial glow */
    background-image: radial-gradient(ellipse 110% 45% at 50% -5%, rgba(124,106,247,0.09) 0%, transparent 65%);
  }
  .brand {
    display: flex; flex-direction: column; align-items: center;
    gap: 6px; padding: 44px 0 32px; text-align: center;
  }
  .brand-icon { font-size: 52px; line-height: 1; }
  .brand h1 { font-size: 26px; font-weight: 700; margin: 0; letter-spacing: -0.3px; }
  .brand p  { font-size: 13px; color: var(--text-muted); margin: 0; }
</style>
</head>
<body>
  <div class="brand">
    <span class="brand-icon">🎙️</span>
    <h1>Voxal</h1>
    <p>Push-to-talk for your team</p>
  </div>
</body>
</html>
