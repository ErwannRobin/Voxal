<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0f0f1a; --bg-raised: #1c1c33; --border: #2e2e50;
    --text-muted: #7a7a9d; --green: #4ade80;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: #e0e0f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0; padding: 20px;
  }
  .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; margin-bottom: 12px; }
  .row { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .ctx { font-size: 12px; color: var(--text-muted); }
  .toggle-btn {
    padding: 3px 10px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--bg-raised);
    color: var(--text-muted); font-size: 11px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.5px;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    font-family: inherit;
  }
  .toggle-btn.active {
    background: rgba(74,222,128,0.15);
    border-color: var(--green);
    color: var(--green);
  }
</style>
</head>
<body>
  <div class="lbl">Toggle button</div>
  <div class="row">
    <button class="toggle-btn">OFF</button>
    <span class="ctx">Hands-free mode</span>
  </div>
  <div class="row">
    <button class="toggle-btn active">ON</button>
    <span class="ctx">Hands-free mode</span>
  </div>
</body>
</html>
