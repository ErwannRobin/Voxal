<!-- @dsCard group="Actions" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0f0f1a; --text-muted: #7a7a9d; --accent: #7c6af7; --red: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: #e0e0f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0; padding: 20px;
  }
  .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; margin-bottom: 12px; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .ctx { font-size: 12px; color: var(--text-muted); }
  .btn-icon {
    background: none; border: none; cursor: pointer;
    font-size: 22px; color: var(--text-muted);
    padding: 4px 6px; border-radius: 4px;
    line-height: 1; transition: color 0.15s; display: inline-flex;
  }
  .btn-icon:hover { color: var(--accent); }
  .btn-icon.leave { font-size: 22px; }
  .btn-icon.leave:hover { color: var(--red); }
</style>
</head>
<body>
  <div class="lbl">Icon button</div>
  <div class="row">
    <button class="btn-icon" title="Settings">⚙️</button>
    <span class="ctx">Settings (hover: accent)</span>
  </div>
  <div class="row">
    <button class="btn-icon leave" title="Leave">🚪</button>
    <span class="ctx">Leave (hover: red)</span>
  </div>
  <div class="row">
    <button class="btn-icon" title="Share">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    </button>
    <span class="ctx">Share (SVG icon)</span>
  </div>
</body>
</html>
